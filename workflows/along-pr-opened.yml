# Along 自动化：PR 创建/更新时触发后续流程
# 替代 pr-watch 的定时轮询机制
name: Along - PR Events

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]
  check_run:
    types: [completed]

jobs:
  notify-along:
    runs-on: ubuntu-latest
    steps:
      - name: 通知 Along 服务器
        env:
          ALONG_WEBHOOK_URL: ${{ secrets.ALONG_WEBHOOK_URL }}
          ALONG_WEBHOOK_SECRET: ${{ secrets.ALONG_WEBHOOK_SECRET }}
        run: |
          if [ -z "$ALONG_WEBHOOK_URL" ]; then
            echo "::warning::ALONG_WEBHOOK_URL 未配置，跳过通知"
            exit 0
          fi

          # 根据事件类型构建 payload
          EVENT_NAME="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ "$EVENT_NAME" = "pull_request_review" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ "$EVENT_NAME" = "check_run" ]; then
            # check_run 事件需要从关联的 PR 中提取编号
            PR_NUMBER="${{ github.event.check_run.pull_requests[0].number }}"
          fi

          PAYLOAD=$(cat <<PAYLOAD_EOF
          {
            "event": "pr.${ACTION}",
            "event_name": "${EVENT_NAME}",
            "action": "${ACTION}",
            "pr_number": ${PR_NUMBER:-0},
            "repository": "${{ github.repository }}",
            "conclusion": "${{ github.event.check_run.conclusion || '' }}"
          }
          PAYLOAD_EOF
          )

          # 计算 HMAC 签名
          if [ -n "$ALONG_WEBHOOK_SECRET" ]; then
            SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$ALONG_WEBHOOK_SECRET" | awk '{print $2}')
            SIGNATURE_HEADER="X-Along-Signature: sha256=$SIGNATURE"
          else
            SIGNATURE_HEADER="X-Along-Signature: none"
          fi

          curl -s -X POST "$ALONG_WEBHOOK_URL/webhook" \
            -H "Content-Type: application/json" \
            -H "$SIGNATURE_HEADER" \
            -d "$PAYLOAD" \
            --max-time 10 \
            --retry 3 \
            --retry-delay 5 || echo "::warning::Webhook 通知失败"
